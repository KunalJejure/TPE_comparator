<!-- ============================================================
     LOGIN PAGE COMPONENT
     Contains: SSO Login with Microsoft + fallback manual form
     ============================================================ -->
<div class="login-container" id="loginPage" {% if sso_authenticated %}style="display:none;" {% endif %}>
    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', path='images/xLM.svg') }}" alt="Logo" style="height: 50px; margin: 0 auto;">
        </div>
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle">Sign in with your company account to continue</p>

        <!-- ======================== SSO LOGIN ======================== -->
        <div class="sso-section" id="ssoSection">
            <a href="/auth/login" class="btn-sso-microsoft" id="btnSsoMicrosoft">
                <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 21 21">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022" />
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
                </svg>
                <span>Sign in with Microsoft</span>
            </a>

            <div class="sso-divider">
                <span>Company SSO</span>
            </div>

            <p class="sso-hint">
                <i data-lucide="shield-check"
                    style="width:16px;height:16px;display:inline-block;vertical-align:middle;"></i>
                Only authorized company accounts can access this application.
            </p>
        </div>

        <!-- =================== FALLBACK MANUAL LOGIN =================== -->
        <!-- Shown only when SSO is not configured (dev mode) -->
        <div class="fallback-login-section" id="fallbackLogin" style="display:none;">
            <div class="sso-divider" style="margin-top:0;">
                <span>Development Mode</span>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Sign In (Dev Mode)</button>
            </form>
        </div>
    </div>
</div>
