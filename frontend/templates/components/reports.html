<!-- ============================================================
     REPORTS VIEW COMPONENT
     Contains: KPI stats, Activity/Distribution charts, Full history table
     ============================================================ -->
<div class="view" id="view-reports">

    <!-- Header Section (Matching Home Page) -->
    <div class="welcome-section" style="max-width: none; margin-left: 0; margin-right: 0;">
        <div class="welcome-text">
            <h2>Reports & Analytics</h2>
            <p>Detailed insights into your comparison history and system performance.</p>
        </div>
    </div>

    <!-- Reports Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon blue">
                <i data-lucide="files" style="width:22px; height:22px;"></i>
            </div>
            <div class="stat-info">
                <div class="stat-label">Total Comparisons</div>
                <div class="stat-value" id="repTotal">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green">
                <i data-lucide="percent" style="width:22px; height:22px;"></i>
            </div>
            <div class="stat-info">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="repSuccess">0%</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon purple">
                <i data-lucide="file-text" style="width:22px; height:22px;"></i>
            </div>
            <div class="stat-info">
                <div class="stat-label">Avg. Pages</div>
                <div class="stat-value" id="repAvgPages">0</div>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 28px;">
        <div class="chart-card" style="margin-bottom:0;">
            <div class="chart-header">
                <h3>Activity Trend</h3>
            </div>
            <div class="chart-container">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
        <div class="chart-card" style="margin-bottom:0;">
            <div class="chart-header">
                <h3>Page Count Distribution</h3>
            </div>
            <div class="chart-container">
                <canvas id="distChart"></canvas>
            </div>
        </div>
    </div>

    <!-- History Table Section -->
    <div class="tasks-section">
        <div class="tasks-header">
            <h3>Full Comparison History</h3>
            <div style="display: flex; gap: 12px; align-items: center;">
                <select id="histFilterStatus" class="period-select" onchange="loadReportsHistory()">
                    <option value="">All Statuses</option>
                    <option value="PASS">Pass Only</option>
                    <option value="CHANGES FOUND">Changes Only</option>
                    <option value="FAIL">Fail Only</option>
                </select>
                <button class="btn-compare" style="padding: 10px 20px; font-size: 0.9rem;" onclick="exportCSV()">
                    <i data-lucide="download" style="width:18px; height:18px; margin-right: 8px;"></i>
                    Export CSV
                </button>
            </div>
        </div>

        <div class="table-card">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Original File</th>
                        <th>Revised File</th>
                        <th>Pages</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reportsTableBody">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>
