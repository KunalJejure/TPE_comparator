<!-- ============================================================
     SIDEBAR COMPONENT
     Contains: Logo, Navigation items, Footer links
     ============================================================ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-toggle" onclick="toggleSidebar()">
        <i data-lucide="chevron-left" style="width:14px; height:14px;"></i>
    </div>

    <div class="sidebar-logo">
        <img src="{{ url_for('static', path='images/xLM.svg') }}" alt="Logo Icon" class="logo-image">
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">WORK</div>
        <a class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')" data-tooltip="Home">
            <i data-lucide="home" style="width:18px; height:18px;"></i>
            <span class="nav-text">Home</span>
        </a>
        <a class="nav-item" data-view="compare" onclick="switchView('compare')" data-tooltip="Compare">
            <i data-lucide="git-compare" style="width:18px; height:18px;"></i>
            <span class="nav-text">Compare</span>
            <span class="badge">+</span>
        </a>
        <a class="nav-item" data-view="reports" onclick="switchView('reports')" data-tooltip="Reports">
            <i data-lucide="file-bar-chart" style="width:18px; height:18px;"></i>
            <span class="nav-text">Reports</span>
        </a>

        <div class="nav-divider"></div>
        <div class="nav-section-label">ACCOUNT</div>
        <a class="nav-item" data-view="settings" onclick="switchView('settings')" data-tooltip="Settings">
            <i data-lucide="settings" style="width:18px; height:18px;"></i>
            <span class="nav-text">Settings</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="nav-divider" style="margin: 0 0 16px 0;"></div>

        <a class="nav-item" data-tooltip="Sign out" onclick="handleLogout()" style="margin-top: 4px;">
            <i data-lucide="log-out" style="width:18px; height:18px;"></i>
            <span class="nav-text">Sign out</span>
        </a>
    </div>
</aside>
